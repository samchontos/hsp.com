server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri $uri/ =404; }
    error_page 404 /404.html;

    location ~* \.(?:css|js|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|webp|ico|mp4|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
    location ~* \.html$ { expires -1; add_header Cache-Control "no-cache"; }

    gzip on; gzip_vary on; gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml font/woff2;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
