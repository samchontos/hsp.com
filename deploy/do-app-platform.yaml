# DigitalOcean App Platform spec for hosting this as a STATIC SITE.
# Push this project to GitHub, then in the DO panel: Create App -> your repo,
# or "Import from App Spec". Replace the repo/branch below.

name: hendersonshapiro
region: nyc
static_sites:
  - name: web
    github:
      repo: <YOUR_GITHUB_USER>/<YOUR_REPO>
      branch: main
      deploy_on_push: true
    source_dir: /
    index_document: index.html
    error_document: 404.html
    catchall_document: 404.html
    routes:
      - path: /

# After creating the app, add hendersonshapiro.com under Settings -> Domains.
# DigitalOcean issues a free HTTPS certificate and shows the DNS records to set.
