# ==========================================================================
# nginx site config for hendersonshapiro.com (static build)
# Use on a DigitalOcean Droplet (Ubuntu + nginx).
# Copy the contents of ../public to /var/www/hendersonshapiro and this file
# to /etc/nginx/sites-available/hendersonshapiro, then symlink it into
# sites-enabled and reload nginx.  See README.md for full steps.
# ==========================================================================

server {
    listen 80;
    listen [::]:80;
    server_name hendersonshapiro.com www.hendersonshapiro.com;

    root /var/www/hendersonshapiro;
    index index.html;

    # Clean, WordPress-style URLs: /about/ -> /about/index.html
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    # ---- Caching -----------------------------------------------------------
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|webp|ico|mp4|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # ---- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json
               application/xml application/rss+xml application/font-woff font/woff2 image/svg+xml;

    # ---- Basic hardening ---------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~ /\.(?!well-known) { deny all; }
}

# ---------------------------------------------------------------------------
# Add HTTPS after DNS is pointed at the droplet:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d hendersonshapiro.com -d www.hendersonshapiro.com
# ---------------------------------------------------------------------------
